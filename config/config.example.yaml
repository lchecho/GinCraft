app:
  name: GinCraft
  mode: debug  # debug, release, test
  port: 8080
  read_timeout: 60
  write_timeout: 60
  api_key: ""  # 服务端 API Key，供 /api/v1/api/* 路由使用

log:
  level: debug  # debug, info, warn, error, fatal, panic
  filename: logs/app.log
  max_size: 100  # MB
  max_age: 30    # days
  max_backups: 10
  compress: false

mysql:
  host: localhost
  port: 3306
  username: root
  password: password
  database: goframe
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600  # seconds

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 10
  min_idle_conns: 5
  max_retries: 3
  dial_timeout: 5    # seconds
  read_timeout: 3
  write_timeout: 3

cors:
  allow_origins: []          # 空或包含 "*" 表示允许所有（allow_credentials=true 时必须显式列举）
  allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allow_headers: ["Content-Type", "Authorization", "X-Requested-With", "X-API-Key", "X-Trace-ID"]
  allow_credentials: false
  max_age: 600
